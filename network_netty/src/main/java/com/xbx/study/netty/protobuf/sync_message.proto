syntax = "proto3";

option java_package = "com.xbx.study.netty.protobuf";
option java_outer_classname = "SyncMessageProto";

// 同步请求消息
message SyncRequest {
  // 请求唯一标识，用于匹配响应（对应 RequestService.getReqKey）
  string request_id = 1;
  // 请求类型/命令
  MessageType type = 2;
  // 请求体（业务数据序列化后的字节）
  bytes payload = 3;
}

// 同步响应消息
message SyncResponse {
  // 请求唯一标识，用于匹配请求（对应 RequestService.getRespKey）
  string request_id = 1;
  // 响应状态
  StatusCode code = 2;
  // 错误信息（code 非 OK 时有值）
  string message = 3;
  // 响应体（业务数据序列化后的字节）
  bytes payload = 4;
}

// 消息类型枚举
enum MessageType {
  MESSAGE_UNKNOWN = 0;
  // 心跳
  HEARTBEAT = 1;
  // 用户相关
  USER_QUERY = 2;
  USER_CREATE = 3;
  // 按业务扩展...
}

// 响应状态码
enum StatusCode {
  OK = 0;
  FAIL = 1;
  TIMEOUT = 2;
  PARAM_ERROR = 3;
}