server:
  port: 8080
  tomcat:
    threads:
      max: 2
      min-spare: 1



spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true
    username: root
    password: mysql
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 5

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

application:
  enable:
    redis: false
    mysql: true